<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hello Wealthica Power-Up</title>

<script src="https://wealthica.github.io/powerups-sdk/powerup.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  text-align: center;
  padding: 40px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 40px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="card">
  <h1>Hello World V</h1>
  <p>This is a Wealthica Power-Up hosted on GitHub Pages.</p>
  <p id="user"></p>
</div>

<script>

const powerup = new WealthicaPowerUp();

powerup.onReady((data) => {
  console.log("Power-Up Loaded", data);

  document.getElementById("user").innerText =
    "Connected to Wealthica account: " + data.user.email;
});

</script>

</body>
</html>

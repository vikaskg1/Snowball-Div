<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wealthica Dividend Summary</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.wealthica.com/addon/wealthica.js"></script>
</head>
<body>
  <div class="container">
    <h1>Dividend Summary</h1>
    <div id="status">Initializing…</div>

    <!-- Custom Date Range Filter -->
    <div class="filters">
      <label>
        Start Date:
        <input type="date" id="startDate">
      </label>
      <label>
        End Date:
        <input type="date" id="endDate">
      </label>
      <button id="applyFilter">Apply Filter</button>
    </div>

    <div id="content"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
